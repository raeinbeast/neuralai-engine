<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NeuralAI Engine</title>
<script type="module">
import { CreateMLCEngine } from 'https://esm.sh/@mlc-ai/web-llm';
const params = new URLSearchParams(location.search);
const modelId = params.get('model') || 'Llama-3.2-3B-Instruct-q4f16_1-MLC';
const originParam = params.get('origin') || '*';
const bc = new BroadcastChannel('neuralai_engine');
document.body.innerHTML = '<pre style="background:#07080f;color:#00d4ff;padding:20px;min-height:100vh;margin:0;font-size:13px;" id="log"></pre>';
const log = document.getElementById('log');
const addLog = t => log.textContent += t + '\n';
addLog('Loading: ' + modelId);
bc.postMessage({type:'status', text:'Loading ' + modelId});
try {
  const engine = await CreateMLCEngine(modelId, {
    initProgressCallback(p) {
      const pct = Math.round((p.progress||0)*100);
      addLog(pct + '% ' + (p.text||'').slice(0,80));
      bc.postMessage({type:'progress', pct, text:p.text||''});
    }
  });
  addLog('✓ Ready!');
  bc.postMessage({type:'ready'});
  bc.onmessage = async (e) => {
    if (e.data.type !== 'chat') return;
    try {
      const stream = await engine.chat.completions.create({
        messages:e.data.messages, temperature:e.data.temperature||0.7,
        max_tokens:e.data.max_tokens||2048, stream:true
      });
      let full='';
      for await (const chunk of stream) {
        const d=chunk.choices[0]?.delta?.content||'';
        if(d){full+=d;bc.postMessage({type:'chunk',text:d,full});}
      }
      bc.postMessage({type:'done',full});
    } catch(e){bc.postMessage({type:'error',text:e.message});}
  };
} catch(e){
  addLog('Error: '+e.message);
  bc.postMessage({type:'error',text:e.message});
}
</script>
</head>
<body></body>
</html>
