<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NeuralAI Engine</title>
</head>
<body style="background:#07080f;color:#00d4ff;font-family:monospace;padding:20px;font-size:13px;margin:0;">
<pre id="log" style="margin:0;white-space:pre-wrap;"></pre>
<script type="module">
import { CreateMLCEngine } from 'https://esm.sh/@mlc-ai/web-llm';

const params = new URLSearchParams(location.search);
const modelId = params.get('model') || 'Llama-3.2-3B-Instruct-q4f16_1-MLC';
const log = document.getElementById('log');

// Send message back to the extension window that opened us
function send(msg) {
  if (window.opener && !window.opener.closed) {
    window.opener.postMessage(msg, '*');
  }
}

function addLog(t) { log.textContent += t + '\n'; }

addLog('NeuralAI Engine');
addLog('Model: ' + modelId);
send({type:'status', text:'Loading ' + modelId + '...'});

try {
  const engine = await CreateMLCEngine(modelId, {
    initProgressCallback(p) {
      const pct = Math.round((p.progress||0)*100);
      const text = p.text || '';
      addLog(pct + '% ' + text.slice(0,80));
      send({type:'progress', pct, text});
    }
  });

  addLog('✓ Model ready!');
  send({type:'ready'});

  // Listen for chat requests from the extension
  window.addEventListener('message', async (e) => {
    const msg = e.data;
    if (!msg || msg.type !== 'chat') return;
    try {
      const stream = await engine.chat.completions.create({
        messages: msg.messages,
        temperature: msg.temperature || 0.7,
        max_tokens: msg.max_tokens || 2048,
        stream: true
      });
      let full = '';
      for await (const chunk of stream) {
        const d = chunk.choices[0]?.delta?.content || '';
        if (d) {
          full += d;
          send({type:'chunk', text:d, full});
        }
      }
      send({type:'done', full});
    } catch(e) {
      send({type:'error', text:e.message});
    }
  });

} catch(e) {
  addLog('Error: ' + e.message);
  send({type:'error', text:e.message});
}
</script>
</body>
</html>
